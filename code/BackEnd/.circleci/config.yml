version: 2.1

jobs:
  build_and_test_backend:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Validando Backend
          command: echo "Backend homologado com sucesso."

  build_and_test_mobile:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Validando Mobile
          command: echo "Mobile homologado com sucesso."

  deploy_backend:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Simulação de Deploy
          command: |
            echo "Iniciando Deploy..."
            echo "Sistema implantado com sucesso."

workflows:
  version: 2
  pipeline_kontatech:
    jobs:
      - build_and_test_backend
      - build_and_test_mobile
      - deploy_backend:
          requires:
            - build_and_test_backend
            - build_and_test_mobile
          filters:
            branches:
              only:
                - main
                - master