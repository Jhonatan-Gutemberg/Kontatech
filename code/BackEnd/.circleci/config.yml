version: 2.1

jobs:
  build-and-test:
    docker:
      # Container principal para o Backend Python
      - image: cimg/python:3.11
        environment:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          SECRET_KEY: test-secret-key
          API_BASE_URL: http://test.local/api
          DEBUG: "False"
      
      # Container secundário para o Banco de Dados dos testes
      - image: cimg/postgres:16.2
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres

    steps:
      - checkout

      # --- ETAPAS DO BACKEND ---
      - run:
          name: Install Backend Dependencies
          command: |
            python -m pip install --upgrade pip
            cd code/BackEnd
            pip install -r requirements.txt
      - run:
          name: Run Backend Tests
          command: |
            cd code/BackEnd
            pytest -q

  build-and-test-mobile:
    docker:
      # Container com suporte ao SDK do Flutter pré-instalado
      - image: cirrusci/flutter:stable
    steps:
      - checkout

      # --- ETAPAS DO FRONTEND (FLUTTER) ---
      - run:
          name: Obter Dependências do Flutter
          command: |
            cd code/mobile/kontatech
            flutter pub get
      - run:
          name: Análise Estática (Linter)
          command: |
            cd code/mobile/kontatech
            flutter analyze

workflows:
  version: 2
  build_and_test_pipeline:
    jobs:
      - build-and-test
      - build-and-test-mobile