version: 2.1

# Definição dos ambientes de execução (Jobs)
jobs:
  # 1. Job para construir e testar o Backend Python
  build_and_test_backend:
    docker:
      - image: cimg/python:3.10  # Imagem oficial do CircleCI para Python
    steps:
      - checkout  # Baixa o código do repositório
      - run:
          name: Instalar Dependências do Backend
          command: |
            cd BackEnd
            pip install -r requirements.txt
      - run:
          name: Executar Testes de Unidade e Integração (Pytest)
          command: |
            cd BackEnd
            pytest

  # 2. Job para construir e testar o Frontend Flutter Mobile
  build_and_test_mobile:
    docker:
      - image: cirrusci/flutter:stable  # Imagem com Flutter pré-instalado
    steps:
      - checkout
      - run:
          name: Obter Dependências do Flutter
          command: |
            cd kontatech
            flutter pub get
      - run:
          name: Executar Testes do App Mobile
          command: |
            cd kontatech
            flutter test

  # 3. Etapa de Lançamento (Simulação de Deploy com Docker)
  deploy_backend:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Simulação de Deploy / Construção de Container
          command: |
            echo "Iniciando Etapa de Lançamento (CD)..."
            echo "Construindo imagem Docker com base no Dockerfile da pasta BackEnd..."
            echo "Sistema implantado com sucesso!"

# Organização do fluxo (Workflows)
workflows:
  version: 2
  pipeline_kontatech:
    jobs:
      # Roda os testes do backend e mobile em paralelo para economizar tempo
      - build_and_test_backend
      - build_and_test_mobile
      # A etapa de deploy só executa após os testes passarem com sucesso na branch principal
      - deploy_backend:
          requires:
            - build_and_test_backend
            - build_and_test_mobile
          filters:
            branches:
              only:
                - main
                - master